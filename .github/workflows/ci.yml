name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      # IN CI, A SKIPPED TEST IS A FAILED TEST.
      #
      # CI is the one place where every dependency is supposed to be present — Docker,
      # Chrome, a network. So a skip here does not mean "not applicable", it means a
      # guard fired that should not have, and a guard that fires wrongly is invisible:
      # nobody reads "skipped".
      #
      # anvil's sandbox tests skipped on EVERY Linux CI run for the life of the project
      # — `pass 11 · fail 0 · skipped 9`, green — because the skip guard probed by
      # running anvil, and anvil was broken. The breakage switched off the tests that
      # would have caught it. This is the net under that.
      - name: run the tests — and none of them may be skipped
        run: |
          node --test 2>&1 | tee "$RUNNER_TEMP/test.txt"
          code=${PIPESTATUS[0]}
          test "$code" -eq 0 || exit $code
          n=$(grep -oE '^# skipped [0-9]+|^. skipped [0-9]+' "$RUNNER_TEMP/test.txt" | grep -oE '[0-9]+$' | head -1)
          echo "skipped: ${n:-0}"
          if [ "${n:-0}" -ne 0 ]; then
            echo "::error::${n} test(s) skipped in CI. Everything they need is installed here — a skip means a guard misfired, and a green build is hiding it."
            exit 1
          fi

  # Looking is part of the build now. This tool shipped a phone layout that dragged
  # the page 250px sideways, and controls at 2.4:1, past a green `node --test` — a
  # test suite does not look at the page. iris does: phone, tablet and desktop, in
  # both themes, and it fails here rather than in front of someone.
  # CAN THE TEST SUITE STILL FAIL? Break the code on purpose in the places whose breakage
  # costs the most, and demand the suite goes RED. A surviving canary means the test guarding
  # that line has stopped guarding it — and you find out today, not the morning after.
  mutants:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: break it on purpose — every canary must die
        run: node scripts/mutants.mjs

  look:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      # THE GATE WAS LOOKING AT AN EMPTY PAGE.
      #
      # Every one of these UIs is data-driven, and CI was serving it with nothing in it.
      # An empty page cannot overflow, cannot collide, cannot clip and cannot be
      # unreadable — there is nothing on it to be wrong. A UI gate that has never seen a
      # row of real data is not a gate; it is a screenshot of an empty room.
      #
      # (agent-hq's gate had been auditing a blank board for months. It went green every
      # time. The seed script existed; nobody ran it.)
      #
      # So: put something real on the page, and ASSERT it is there before looking.
      - name: Serve it, THEN put something on it
        run: |
          SCOUT_DB=./.scout/cache.db node scripts/seed.js
          SCOUT_DB=./.scout/cache.db node src/cli.js serve &
          for i in $(seq 30); do curl -sf http://localhost:7950/api/stats >/dev/null && break; sleep 1; done
          n=$(curl -sf http://localhost:7950/api/stats | node -pe "JSON.parse(require('fs').readFileSync(0)).pages ?? 0")
          echo "on the page: pages=$n"
          test "$n" -gt 0 || { echo "::error::pages=0 — iris would be auditing an empty page"; exit 1; }
      - uses: tools-for-agents/iris@main
        with:
          url: http://localhost:7950/
          viewports: phone,tablet,desktop
          name: scout
          tokens: kit      # the kit's ONE design system — iris/tokens.json, not a copy
          strict: true     # drift is a regression now; a gate is what keeps it from creeping back
          # A HOVER STATE IS CSS NOBODY HAS EVER LOOKED AT, and this stylesheet has 24 of them that
          # no gate here had ever rendered — JS cannot pose :hover, it is the browser's own. cortex,
          # anvil and recall each shipped a real one this way (the ink was chosen against the surface
          # the row SITS on, not the one it MOVES to). These 6 are the ones the library page can reach;
          # the rest live in the reader, the overview and the TOC, and are named in those gates.
          #
          # 🔑 .toc-toggle is NOT in this list even though it MATCHES here: it is [hidden] on the
          # library page, and iris counts a --hover selector as landed when it matches the DOM, not
          # when it renders. A hidden match is a pass that means nothing. It is gated in look-toc,
          # where it is on screen.
          hover: '.brand .theme, .card, .fetchbar button, .host-chip, .shelf-stats, .xtk a'

  # ── …AND THE READING ROOM, WHICH IS THE ONLY REASON scout EXISTS ──────────────
  #
  # `look` seeds pages and renders the LIST. `first-run` renders it empty. `states` poses the page by
  # setting classes. Not one of them had ever OPENED AN ARTICLE — the room this tool is named for.
  #
  # It reaches the state by USING the app (clicking a card), not by posing it. The first look that
  # ever opened an article found, at every viewport and both themes: the source link 285×15 (wide,
  # and 9px short of a finger); "🧠 → cortex" written as a LITERAL #8b5cf6 in both themes, 3.84:1 on
  # each (the same bug, and the same fix, as lens's .ch-btn.brain — these pages share DNA, so they
  # share defects); the card list holding its last summary under the fixed cross-tool bar forever
  # (it HAS overflow:auto, and scrollHeight === clientHeight, so there was nothing to scroll: a
  # scroller with nowhere to go cannot move anything out from under anything); and — because this is
  # the one stylesheet that is ALL typography — a prose rhythm nobody had ever graded, em multiples
  # of a 16px base landing at 18.4px, 6.4px, 13.76px, off the grid and scale this kit declares.
  look-reader:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Serve it, THEN prove there is an article to open
        run: |
          SCOUT_DB=./.scout/cache.db node scripts/seed.js
          SCOUT_DB=./.scout/cache.db node src/cli.js serve &
          for i in $(seq 30); do curl -sf http://localhost:7950/api/overview >/dev/null && break; sleep 1; done
          n=$(curl -sf http://localhost:7950/api/overview | node -pe "JSON.parse(require('fs').readFileSync(0)).pages ?? 0")
          echo "pages the gate can open: $n"
          test "$n" -gt 0 || { echo "::error::no pages cached — iris would audit a reading room with nothing to read"; exit 1; }
      - uses: tools-for-agents/iris@main
        with:
          url: http://localhost:7950/
          viewports: phone,tablet,desktop
          name: scout-reader
          tokens: kit      # the kit's ONE design system — iris/tokens.json, not a copy
          strict: true     # drift is a regression now; a gate is what keeps it from creeping back
          # Click a real card, then assert the article is actually IN the reader. A --pre that throws
          # makes iris report "the state was never reached and NOTHING was audited" instead of quietly
          # grading the list behind it.
          #
          # The sleep(1500)/sleep(1800) that used to open this were BETS: they pass on a laptop and
          # fail on a loaded runner. That is not hypothetical — cortex's look-panels caught its own
          # panel 17px from home, mid-slide, on the first CI run that ever opened it. A poll waits for
          # the prose to ARRIVE and costs ~50ms when it is already there.
          #
          # Opening a card is also what fills the recent strip (openArticle → pushRecent), so .rchip
          # and .clr are rendered here — they are localStorage-backed and hidden until you read
          # something, which is a state no gate reaches by loading a URL.
          #
          # AND THE RELATED-READS at the foot of the article: `.rel-card`, "More from <host>", from
          # /api/related. It only renders for a page whose HOST has siblings in the library — "The
          # hub" (the first card) has none, so this gate opened the one page in the seed that has no
          # related reads, and `.rel-card` sat in no hover list at all, rendered by nothing. So click
          # a tools-for-agents.dev card, which has four siblings, and hover them too. Clean at every
          # viewport — a gate because "clean" is a fact with a shelf life.
          # .ob-go too: the "Where this page points" outbound panel. It renders both a "read ↗"
          # (a link the library already has) and a "read it" (.ob-go.new, one it doesn't) — and the
          # seed's all-agent-company page now links to one of each on purpose, so both button states
          # are on screen. This panel had rendered on no gate: the seed pages linked only to each
          # other, so the .new variant never existed to be looked at.
          hover: '.article a, .byline a, .copy-md, .forget, .re-read, .to-brain, .recent .rchip, .recent .clr, .card, .rel-card, .ob-go, .ob-go.new'
          pre: >-
            const until=async(f,ms=9000)=>{const t=Date.now()+ms;while(Date.now()<t){if(f())return true;await new Promise(r=>setTimeout(r,50));}throw new Error('timed out waiting for the reader to arrive');};await until(()=>document.querySelectorAll('[data-url]').length>0);const cards=[...document.querySelectorAll('[data-url]')];const card=cards.find((c)=>/the-all-agent-company/.test(c.dataset.url))||cards[0];card.click();await until(()=>{const a=document.querySelector('#reader, article');return a&&a.textContent.trim();});if(!document.querySelector('.article p, .article h1, .article h2')) throw new Error('the reader opened with no prose in it — that is an empty room, not an article');if(!document.querySelector('.article a')) throw new Error('this article has no inline links — .article a would not render, pick a page that has one');await until(()=>document.querySelectorAll('.recent .rchip').length>0);await until(()=>document.querySelectorAll('.rel-card').length>0,9000);await until(()=>document.querySelectorAll('.ob-go').length>0,9000);if(!document.querySelector('.ob-go.new')) throw new Error('the .ob-go.new (unread) variant did not render — the seed page must link to a page NOT in the library');const forget=document.querySelector('.forget');if(!forget) throw new Error('the reader has no forget button to arm');forget.classList.add('armed');const copy=document.querySelector('.copy-md');if(copy) copy.classList.add('ok');

  # ── THE TABLE OF CONTENTS, WHICH NO GATE COULD HAVE RENDERED IF IT TRIED ──────
  #
  # look-reader opens the FIRST card. The first card is "The hub", which has 0 headings — and the
  # TOC toggle hides itself under 2. So the one page this gate has ever opened is the one page in
  # the seed that cannot have a table of contents, and the whole TOC — toggle, popover, items — had
  # never been on screen in CI. Not skipped: unreachable, by an accident of seed order.
  #
  # So find a page that HAS one and click that card. It is clean at every viewport; it is gated
  # because "clean" is a fact with a shelf life.
  look-toc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Serve it, THEN prove some page has headings to list
        run: |
          SCOUT_DB=./.scout/cache.db node scripts/seed.js
          SCOUT_DB=./.scout/cache.db node src/cli.js serve &
          for i in $(seq 30); do curl -sf http://localhost:7950/api/stats >/dev/null && break; sleep 1; done
          n=$(curl -sf http://localhost:7950/api/stats | node -pe "JSON.parse(require('fs').readFileSync(0)).pages ?? 0")
          test "$n" -gt 0 || { echo "::error::pages=0 — there would be no article to list"; exit 1; }
      - uses: tools-for-agents/iris@main
        with:
          url: http://localhost:7950/
          viewports: phone,tablet,desktop
          name: scout-toc
          tokens: kit
          strict: true
          hover: '.toc-pop .toc-item, .toc-toggle'
          pre: >-
            const until=async(f,ms=9000)=>{const t=Date.now()+ms;while(Date.now()<t){if(f())return true;await new Promise(r=>setTimeout(r,50));}throw new Error('timed out waiting for the table of contents to arrive');};await until(()=>document.querySelectorAll('.card[data-url]').length>0);const lib=await (await fetch('/api/library')).json();const urls=(lib.pages||lib.items||[]).map(p=>p.url);let target=null;for(const u of urls){const p=await (await fetch('/api/page?url='+encodeURIComponent(u))).json();if((((p.markdown||'').match(/^#{1,3} /gm))||[]).length>=2){target=u;break;}}if(!target) throw new Error('no seeded page has 2+ headings — nothing here would render a TOC');const card=[...document.querySelectorAll('.card[data-url]')].find(c=>c.dataset.url===target);if(!card) throw new Error('the page with a TOC has no card to click');card.click();await until(()=>!!document.querySelector('.article p, .article h1'));await until(()=>!document.getElementById('tocToggle').hidden);document.getElementById('tocToggle').click();await until(()=>document.querySelectorAll('.toc-pop .toc-item').length>0);

  # ── THE OVERVIEW, WHICH NOTHING HAD EVER OPENED ───────────────────────────────
  #
  # `look` renders the library, `look-reader` the article. The reading overview — the shelf stats,
  # the day strip, the host rows — is behind #stats, and no gate had ever pressed it. cortex found
  # an ORPHAN badge at 1.94:1 and a panel 17px off a phone screen behind exactly this kind of door.
  #
  # This one is CLEAN, at phone, tablet and desktop, and it is gated because that is a fact with a
  # shelf life, not a reason to skip it.
  look-overview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Serve it, THEN prove there is a reading history to overview
        run: |
          SCOUT_DB=./.scout/cache.db node scripts/seed.js
          SCOUT_DB=./.scout/cache.db node src/cli.js serve &
          for i in $(seq 30); do curl -sf http://localhost:7950/api/overview >/dev/null && break; sleep 1; done
          n=$(curl -sf http://localhost:7950/api/overview | node -pe "JSON.parse(require('fs').readFileSync(0)).pages ?? 0")
          echo "pages the overview can count: $n"
          test "$n" -gt 0 || { echo "::error::no pages cached — the overview would open EMPTY, which is an empty room"; exit 1; }
      - uses: tools-for-agents/iris@main
        with:
          url: http://localhost:7950/
          viewports: phone,tablet,desktop
          name: scout-overview
          tokens: kit
          strict: true
          hover: '.days .day, .heavy, .hostrow, .host-chip, .ovw .ovw-x, .shelf-stats'
          pre: >-
            const until=async(f,ms=9000)=>{const t=Date.now()+ms;while(Date.now()<t){if(f())return true;await new Promise(r=>setTimeout(r,50));}throw new Error('timed out waiting for the overview to arrive');};await until(()=>document.querySelectorAll('[data-url]').length>0);document.getElementById('stats').click();await until(()=>!document.getElementById('overview').hidden);await until(()=>document.querySelectorAll('.days .day, .hostrow').length>0);

  # THE WIDEN AFFORDANCE — the one control that appears ONLY when a search overflows the shelf.
  #
  # `look` seeds data and hovers the shelf; `look-reader` opens an article; `look-overview` presses
  # #stats. Not one of them ever made a search WITHHOLD, so `.sq-b` — the "Show 40" button that
  # raises the 20-hit result cap and re-runs — was the last interactive control in the whole kit that
  # nothing here had ever rendered. And iris counts a hover selector as landed when it MATCHES THE
  # DOM, not when it renders (see the note in `look`), so a button that never appears is a hover that
  # silently passes over nothing — a green that means nothing. The seed carries enough pages that a
  # search for a word every article contains overflows the cap and the button appears; drop those
  # pages and this gate goes RED, because the control it hovers stops existing. That is the proof it
  # is a gate and not decoration. CLEAN at phone, tablet and desktop.
  look-search:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Serve it, THEN prove a common search overflows the result cap
        run: |
          SCOUT_DB=./.scout/cache.db node scripts/seed.js
          SCOUT_DB=./.scout/cache.db node src/cli.js serve &
          for i in $(seq 30); do curl -sf http://localhost:7950/api/overview >/dev/null && break; sleep 1; done
          w=$(curl -sf "http://localhost:7950/api/search?k=20&q=the" | node -pe "JSON.parse(require('fs').readFileSync(0)).withheld ?? 0")
          echo "pages withheld beyond the 20-hit cap: $w"
          test "$w" -gt 0 || { echo "::error::a search for \"the\" withheld nothing — the seed no longer overflows the cap, so the widen button (.sq-b) cannot render"; exit 1; }
      - uses: tools-for-agents/iris@main
        with:
          url: http://localhost:7950/
          viewports: phone,tablet,desktop
          name: scout-search
          tokens: kit
          strict: true
          # .sq-b is below 20 result cards — iris scrolls to a hover target, so hovering it both
          # proves it renders and audits its :hover (accent fill) contrast, the one state JS cannot pose.
          hover: '.sq-b'
          pre: >-
            const wait=async(sel,ms=9000)=>{const t=Date.now()+ms;while(Date.now()<t){if(document.querySelector(sel))return;await new Promise(r=>setTimeout(r,50));}throw new Error('waited '+ms+'ms for '+sel);};await wait('[data-url]');const q=document.getElementById('q');if(!q)throw new Error('the search box (#q) is not on the page');q.value='the';q.dispatchEvent(new Event('input',{bubbles:true}));try{await wait('.squeeze .sq-b');}catch(e){throw new Error('the search matched too few pages to withhold any, so the widen button (.sq-b) never rendered — the reading-room seed must overflow the 20-hit cap for this state to exist');}document.querySelector('.sq-b').scrollIntoView({block:'center'});

  # THE EMPTY STATE IS THE ONE STATE EVERY USER SEES FIRST — AND NOTHING WAS LOOKING AT IT.
  #
  # The `look` job above seeds data on purpose: a UI gate that has never seen a row of data
  # is a screenshot of an empty room. But making every gate seed meant the EMPTY page — the
  # first thing a new user ever sees — stopped being rendered by anything at all. I closed
  # one blind spot by opening another.
  #
  # And a real bug was living in it: `scout serve` CRASHED AT STARTUP on a machine with no
  # cache, because stats() runs before the server listens and a read no longer creates the
  # store. A brand-new user's very first command died. The tests seed, the gate seeds, and
  # my own machine has had a cache for weeks — so the bug lived in a state nothing here
  # ever entered.
  first-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: browser-actions/setup-chrome@v1
        id: chrome
      - name: serve it with NOTHING in it, exactly as a new user would
        run: |
          SCOUT_DB=/tmp/empty/s.db node src/cli.js serve &
          for i in $(seq 30); do curl -sf http://localhost:7950/ >/dev/null && break; sleep 1; done
          curl -sf http://localhost:7950/ >/dev/null || { echo "::error::the server did not start on an empty store — that is what a new user gets"; exit 1; }
      - uses: tools-for-agents/iris@main
        with:
          url: http://localhost:7950/
          viewports: phone,tablet,desktop
          name: scout-first-run
          pre: >-
            const shown=e=>{const s=getComputedStyle(e),r=e.getBoundingClientRect();return s.visibility!=='hidden'&&s.display!=='none'&&r.width>0&&r.height>0;};const vis=[...document.querySelectorAll('.empty,.empty2,.welcome,.list-empty,.detail-empty,.flow-empty,.act-empty')].filter(shown);if(!vis.length) throw new Error('THE SERVER SAID EMPTY AND THE PAGE SAID NOTHING — a fresh install shows the user a blank room');
          tokens: kit

  # ── THE STATES NOTHING EVER RENDERED ──────────────────────────────────────────
  # `test` proves the logic. `look` renders the page WORKING. `first-run` renders it
  # EMPTY. Not one of them has ever rendered a control that cannot be pressed, or a row
  # switched off, or a card blocked — the states you have to DO something to reach.
  #
  # So nobody had ever looked at them, and every single one of them was broken: every
  # disabled control in this kit was unreadable, two of them at 1:1 — the exact colour of
  # their own background — under three green gates. A state that is never rendered is a
  # state that is never checked, and it will rot, quietly, forever.
  #
  # This gate poses the page in those states and audits it there.
  states:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Serve it
        run: |
          node src/cli.js index . || true
          node src/cli.js serve --port 7960 &
          for i in $(seq 30); do curl -sf http://localhost:7960/ >/dev/null && break; sleep 1; done
      - uses: tools-for-agents/iris@main
        with:
          url: http://localhost:7960/
          viewports: desktop
          tokens: kit
          name: states
          pre: >-
            document.querySelectorAll('button,input,select,textarea').forEach(e=>e.disabled=true);document.querySelectorAll('.card').forEach(e=>e.classList.add('blocked'));document.querySelectorAll('#legend .row,.gl-item').forEach(e=>e.classList.add('off'))

  # ── WHAT DOES IT DRAW WHEN THE SERVER SAYS NO? ────────────────────────────────
  # This UI is a shell that asks a server what to render, and it had never once
  # rendered the answer "no". The helper was `fetch(p).then(r => r.json())` — it never
  # looked at `r.ok`, so a 500 with a JSON body came back looking exactly like DATA,
  # `.map` threw halfway through the render, and the page was left a blank shell.
  #
  # The result: when the backend died you were shown AN EMPTY ROOM. Nothing on screen
  # told "the server is down" apart from "you have no data" — and the `first-run` gate
  # PROVES the empty page looks fine, so it went green over it every time.
  #
  # An error state that renders as an empty state is worse than a crash. A crash at
  # least tells you something happened.
  #
  # --boot breaks the API before the app's first line runs; --pre then asserts the app
  # ADMITTED it. A page that quietly renders nothing fails this job.
  dead-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Serve it
        run: |
          node src/cli.js index . || true
          node src/cli.js serve --port 7960 &
          for i in $(seq 30); do curl -sf http://localhost:7960/ >/dev/null && break; sleep 1; done
      - uses: tools-for-agents/iris@main
        with:
          url: http://localhost:7960/
          viewports: desktop
          tokens: kit
          name: dead-api
          boot: >-
            const f=window.fetch;window.fetch=(u,o)=>String(u).includes('/api/')?Promise.resolve(new Response('{"error":"ci"}',{status:500,headers:{'content-type':'application/json'}})):f(u,o);
          pre: >-
            const b=document.getElementById('apidown');if(!b||b.hidden||!b.textContent.trim()) throw new Error('the server said no and the page said NOTHING');const shown=e=>{const s=getComputedStyle(e),r=e.getBoundingClientRect();return s.visibility!=='hidden'&&s.display!=='none'&&r.width>0&&r.height>0;};const vis=[...document.querySelectorAll('.empty,.empty2,.welcome,.list-empty,.detail-empty,.flow-empty,.act-empty')].filter(shown);if(vis.length) throw new Error('THE SERVER SAID NO, AND THE PAGE STILL CLAIMS YOU HAVE NOTHING: '+vis.map(e=>e.id||e.className).join(', '));

  # ── AND WHAT DOES IT DRAW WHILE THE SERVER IS STILL THINKING? ─────────────────
  # This app had exactly ONE way of showing "nothing": nothing. So three completely
  # different truths rendered as the same picture — you have no data, the server is
  # broken, and the server has not answered yet.
  #
  # On a slow backend, lens put its welcome screen up — "Pick a file from the tree" —
  # over a tree that had not loaded. The empty state is a CLAIM ("you have nothing"),
  # and the app was making it before it had any evidence. It had not been told
  # "nothing". It had not been told ANYTHING.
  #
  # --boot makes every API call take 20s. The page must say it is still asking.
  slow-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Serve it
        run: |
          node src/cli.js index . || true
          node src/cli.js serve --port 7960 &
          for i in $(seq 30); do curl -sf http://localhost:7960/ >/dev/null && break; sleep 1; done
      - uses: tools-for-agents/iris@main
        with:
          url: http://localhost:7960/
          viewports: desktop
          tokens: kit
          name: slow-api
          boot: >-
            const f=window.fetch;window.fetch=(u,o)=>String(u).includes('/api/')?new Promise(r=>setTimeout(()=>r(f(u,o)),20000)):f(u,o);
          pre: >-
            const p=document.getElementById('busypill');if(!p||p.hidden) throw new Error('SILENT WAIT: the server is thinking and the page says nothing');if(document.body.getAttribute('aria-busy')!=='true') throw new Error('and nothing announced it to a screen reader either');const shown=e=>{const s=getComputedStyle(e),r=e.getBoundingClientRect();return s.visibility!=='hidden'&&s.display!=='none'&&r.width>0&&r.height>0;};const vis=[...document.querySelectorAll('.empty,.empty2,.welcome,.list-empty,.detail-empty,.flow-empty,.act-empty')].filter(shown);if(vis.length) throw new Error('STILL ASKING, YET CLAIMING EMPTY: '+vis.map(e=>e.className).join(', '));

  # ── AND WHAT HAPPENS AFTER YOU ACT? ───────────────────────────────────────────
  # Every state so far has been one the app FOUND itself in. This is the one it is put
  # into: you press the button, the server refuses the write, and… what?
  #
  # The failure mode here is not an error, it is SILENCE. A write that fails quietly is
  # the worst bug a tool like this can have, because the user walks away believing their
  # work was saved. And its twin: the write fails, and the button that would let you try
  # again is still greyed out saying "creating…" — so the app is both wrong and stuck.
  #
  # --boot refuses every non-GET (reads stay healthy). --pre then DRIVES THE REAL WRITE
  # — opens the form, types, presses the button — and demands the page admit it failed
  # and give the control back.
  refused-write:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Serve it
        run: |
          node src/cli.js index . || true
          node src/cli.js serve --port 7960 &
          for i in $(seq 30); do curl -sf http://localhost:7960/ >/dev/null && break; sleep 1; done
      - uses: tools-for-agents/iris@main
        with:
          url: http://localhost:7960/
          viewports: desktop
          tokens: kit
          name: refused-write
          boot: >-
            const f=window.fetch;window.fetch=(u,o)=>(o&&o.method&&o.method!=='GET')?Promise.resolve(new Response('{"error":"the server refused the write"}',{status:500,headers:{'content-type':'application/json'}})):f(u,o);
          pre: >-
            const settled=async(f,ms=9000)=>{const t=Date.now()+ms;while(Date.now()<t){if(f())return true;await new Promise(r=>setTimeout(r,50));}return false;};const said=()=>[...document.querySelectorAll('*')].some(e=>e.children.length===0&&/refused the write/i.test(e.textContent));const spinning=()=>[...document.querySelectorAll('button')].filter(b=>b.disabled&&/…|ing\b/i.test(b.textContent));const i=document.querySelector('#url,input[type=url],header input');i.value='https://example.com';i.dispatchEvent(new Event('input',{bubbles:true}));document.getElementById('go').click();await settled(()=>said()&&!spinning().length);const stuck=spinning();if(stuck.length) throw new Error('THE WRITE FAILED AND THE BUTTON IS STILL SPINNING: '+stuck.map(b=>b.textContent.trim()).join(', '));if(!said()) throw new Error('THE WRITE FAILED AND THE PAGE SAID NOTHING — the user cannot tell whether their work was saved');
